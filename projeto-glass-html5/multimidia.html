<!DOCTYPE html>
<html lang="pt-br">

<!--
Area comportamental do site, tudo que deverar ser feito.
-->

<head>

    <meta charset="utf-8" />
    <title>Tudo sobre Google Glass</title>
    <!--
Formatação para todas tag "p"

metodo link para ligar outros arquivos
-->
    <link rel="stylesheet" type="text/css" href="_css/estilo.css" />
    <link rel="stylesheet" type="text/css" href="_css/media.css" />

</head>

<script src="_javascript/funcoes.js"></script>

<body>
    <!--
Div ser para criar uma divisão na página, uma área de divisão
pode se colocar uma identificação na DIV usando ID e colocando nome
-->
    <div id="interface">
        <!--    
Para agrupar um titulo utiliza a tag <hgroup>
-->
        <header id="cabecalho">

            <hgroup>
                <h1>Google Glass</h1>
                <h2>A revolução do Google está chegando</h2>
            </hgroup>
            <!--
    src = para origem do aquivo, ou pasta de destino
-->
            <img id="icone" src="_imagens/glass-oculos-preto-peq.png" />
            <!--
Tudo o que estiver na tag nav, vai ser o menu de navegação.

teram duas tag
OL> Lista ordenadas com tag e tipos <li>
UL> Lista não ordenada ou demarcadores tag e tipos <li>
-->

            <nav id="menu">
                <h1>Menu Principal</h1>
                <!-- 
Posso colocar uma lista dentro de outra lista
-->
                <ul type="disc">
                    <li onmouseover="mudaFoto('_imagens/home.png')" onmouseout="mudaFoto('_imagens/multimidia.png')"><a
                            href="index.html">Home</a></li>
                    <li onmouseover="mudaFoto('_imagens/especificacoes.png')"
                        onmouseout="mudaFoto('_imagens/multimidia.png')"><a href="specs.html">Especificações</a></li>
                    <li onmouseover="mudaFoto('_imagens/fotos.png')" onmouseout="mudaFoto('_imagens/multimidia.png')"><a
                            href="fotos.html">Fotos</a></li>
                    <li onmouseover="mudaFoto('_imagens/multimidia.png')"
                        onmouseout="mudaFoto('_imagens/multimidia.png')"><a href="multimidia.html">Multimídia</a></li>
                    <li onmouseover="mudaFoto('_imagens/contato.png')" onmouseout="mudaFoto('_imagens/multimidia.png')">
                        <a href="fale-conosco.html">Fale conosco</a></li>
                </ul>
            </nav>

        </header>

        <article id="noticia-principal">
            <header id="cabecalho-artigo">
                <hgroup>
                    <h3>Glass > Multimídia</h3>
                    <h1 class="font">Sons e vídeos</h1>
                    <h2 class="menor">por Matheus Avelino</h2>
                    <h3 class="direita">Atualizado em 08/Abril/2023</h3>
                </hgroup>
            </header>
        </article>


        Áudio e Vídeo
        <div id="radio-tv">
            <img src="_imagens/radio-tv.png" />
        </div>

        <!--
Para da mas compatibilidade aos navegadores
pode ser usado a conversão da extensão dos arquivos.
-->
        <audio id="musica" controls="controls">
            <source src="_media/Kalimba.mp3" type="audio/mpeg" />
            Desculpe, não foi possivel reproduzir o Áudio.
        </audio>
        <video id="filme" controls="constrols" poster="_imagens/video-mini03.jpg">
            <source src="_media/Wildlife.mp4" type="video/mp4" />
            Desculpe, não foi possivel reproduzir o Vídeo.
        </video>

        <footer id="rodape">
            <p>Copyright &copy; 2013 - by Gustavo Guanabara <br /><a href="http://facebook.com/cursosemvideo"
                    target="_blank">Facebook</a>
                <a href="http://twitter.com/cursosemvideo" target="_blank">| Twitter</a>
            </p>
        </footer>
    </div>
</body>

</html>
